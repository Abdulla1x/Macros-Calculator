services:
  - type: web
    name: macros-calculator-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # Migrations run before the server starts (single instance, no race).
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      # Neon Postgres connection string, as postgresql+psycopg://...?sslmode=require
      # Set in the Render dashboard (never committed).
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      # Gemini API key for AI meal analysis (optional; feature 503s without it).
      - key: GEMINI_API_KEY
        sync: false
      # Per-user daily cap on AI analyses, protecting the shared Gemini quota.
      - key: AI_DAILY_LIMIT
        value: "20"
      # Your deployed frontend origin(s), comma-separated. Set in the Render
      # dashboard — a committed placeholder would silently block the real
      # frontend if left unedited.
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.14.4"
